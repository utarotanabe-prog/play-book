<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Playbook — 東大アメフト部の手帳</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --green:#2ECC71;--green-dark:#27ae60;--green-text:#0a4a20;
  --amber:#F39C12;--amber-bg:#fff3e0;--amber-text:#7a4800;
  --blue:#3498DB;--blue-bg:#e8f4fd;--blue-text:#0c4177;
  --red:#e74c3c;--red-bg:#fdecea;--red-text:#7a1a14;
  --purple:#9b59b6;
  --bg:#0f1117;--bg2:#181c26;--bg3:#1e2330;--bg4:#252a38;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
  --text:#e8eaf0;--text2:#9aa0b0;--text3:#5a6070;
  --r:10px;--rl:14px;--font:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px;-webkit-tap-highlight-color:transparent}
.sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.25rem 0;transition:transform .25s;z-index:200}
.logo{display:flex;align-items:center;gap:10px;padding:0 1.25rem 1.25rem;border-bottom:1px solid var(--border)}
.logo-icon{width:34px;height:34px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--green-text)}
.logo-text{font-size:16px;font-weight:700}.logo-sub{font-size:10px;color:var(--text3)}
.nav{padding:1rem .75rem;flex:1;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-label{font-size:10px;color:var(--text3);padding:8px 8px 4px;letter-spacing:.06em;text-transform:uppercase}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;font-size:13px;cursor:pointer;border:none;background:transparent;color:var(--text2);text-align:left;width:100%;transition:all .15s;font-family:var(--font)}
.nav-btn:hover{background:var(--bg3);color:var(--text)}.nav-btn.active{background:var(--bg4);color:var(--green)}
.nav-btn i{font-size:17px;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500}
.nb-g{background:rgba(46,204,113,.2);color:var(--green)}.nb-a{background:rgba(243,156,18,.2);color:var(--amber)}.nb-r{background:rgba(231,76,60,.2);color:var(--red)}
.sidebar-footer{padding:.75rem 1.25rem;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}
.today-chip{background:var(--bg4);border-radius:6px;padding:6px 10px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.5rem;border-bottom:1px solid var(--border);background:var(--bg2);gap:10px;flex-wrap:wrap}
.topbar h1{font-size:16px;font-weight:700}.topbar-right{display:flex;gap:8px;flex-wrap:wrap}
.hamburger{display:none;background:transparent;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:2px}
.content{flex:1;overflow-y:auto;padding:1.5rem}
.page{display:none}.page.active{display:block}
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:.85rem 1rem}
.s-label{font-size:11px;color:var(--text3);margin-bottom:4px}.s-val{font-size:24px;font-weight:700}.s-sub{font-size:10px;color:var(--text3);margin-top:2px}
.c-g{color:var(--green)}.c-a{color:var(--amber)}.c-r{color:var(--red)}.c-b{color:var(--blue)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:1rem;display:flex;align-items:center;gap:7px}
.card-title i{font-size:16px}
.task-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.task-item:last-child{border-bottom:none}
.cb{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.cb.done{background:var(--green);border-color:var(--green)}.cb.done::after{content:'✓';font-size:12px;color:white;font-weight:700}
.task-name{flex:1;font-size:13px}.task-name.done{text-decoration:line-through;color:var(--text3)}
.tag{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500}
.tag-club{background:rgba(46,204,113,.15);color:var(--green)}.tag-study{background:rgba(52,152,219,.15);color:var(--blue)}
.tag-work{background:rgba(243,156,18,.15);color:var(--amber)}.tag-other{background:var(--bg4);color:var(--text2)}
.pri-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pri-high{background:var(--red)}.pri-mid{background:var(--amber)}.pri-low{background:var(--green)}
.task-time{font-size:11px;color:var(--text3)}
.icon-btn{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px;border-radius:4px}
.icon-btn:hover{color:var(--text);background:var(--bg4)}
.repeat-chip{font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(155,89,182,.2);color:#c39bd3;display:inline-flex;align-items:center;gap:3px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-hcell{text-align:center;font-size:11px;color:var(--text3);padding:6px 0;font-weight:700}
.cal-cell{background:var(--bg3);border-radius:8px;min-height:76px;padding:5px;cursor:pointer;border:1px solid transparent;transition:border-color .15s;overflow:hidden}
.cal-cell:hover{border-color:var(--border2)}.cal-cell.today{border-color:var(--green)}.cal-cell.other-month{opacity:.3}
.cal-day-num{font-size:12px;font-weight:700;margin-bottom:3px;color:var(--text2)}.cal-cell.today .cal-day-num{color:var(--green)}
.cal-chip{font-size:9px;padding:1px 4px;border-radius:3px;margin:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-nav{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.cal-nav h2{font-size:16px;font-weight:700;flex:1}
.cal-nav-btn{background:var(--bg4);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;padding:5px 10px;font-size:13px}
.pcard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:8px}
.pcard:hover{border-color:var(--border2)}
.pcard-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.pcard-date{font-size:12px;color:var(--text3)}.pcard-focus{font-size:13px;font-weight:700}
.stars{display:flex;gap:2px}.star{font-size:14px;color:var(--text3)}.star.on{color:var(--amber)}
.pcard-body{font-size:12px;color:var(--text2);line-height:1.7}
.ptags{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.ptag{font-size:10px;padding:2px 7px;border-radius:99px;background:var(--bg4);color:var(--text3)}
.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:10px}
.media-thumb{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:var(--bg4);cursor:pointer;border:1px solid var(--border)}
.media-thumb img,.media-thumb video{width:100%;height:100%;object-fit:cover}
.media-play-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.media-play-icon div{width:34px;height:34px;background:rgba(0,0,0,.65);border-radius:50%;display:flex;align-items:center;justify-content:center}
.media-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.75);border:none;color:white;border-radius:4px;cursor:pointer;padding:2px 6px;font-size:11px;opacity:0;transition:opacity .15s}
.media-thumb:hover .media-del{opacity:1}
.media-add-btn{aspect-ratio:1;border-radius:8px;border:1.5px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:11px;font-family:var(--font);transition:all .15s;padding:8px;text-align:center}
.media-add-btn:hover{border-color:var(--green);color:var(--green);background:rgba(46,204,113,.05)}
.media-add-btn i{font-size:22px}
.dcard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:8px;cursor:pointer}
.dcard:hover{border-color:var(--border2)}
.dcard-preview{font-size:13px;color:var(--text2);line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.mood-row{display:flex;gap:8px;flex-wrap:wrap}
.mood-btn{font-size:20px;background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;opacity:.5;transition:all .15s}
.mood-btn.sel{opacity:1;border-color:var(--border2)}
.ex-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.ex-item:last-child{border-bottom:none}
.ex-name{flex:1;font-size:13px}.ex-val{font-size:13px;color:var(--green);font-weight:700}
.meal-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.meal-item:last-child{border-bottom:none}
.meal-name{flex:1;font-size:13px}.meal-cal{font-size:12px;color:var(--amber);font-weight:700}
.pbar-bg{background:var(--bg4);border-radius:99px;height:6px;margin-top:4px}
.pbar{border-radius:99px;height:6px;transition:width .3s}
.macro-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.macro-box{background:var(--bg3);border-radius:8px;padding:8px;text-align:center}
.macro-val{font-size:16px;font-weight:700}.macro-label{font-size:10px;color:var(--text3)}
.arow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.arow:last-child{border-bottom:none}
.aname{flex:1;font-size:13px}.asubj{font-size:11px;color:var(--text3)}
.ddl{font-size:12px;padding:3px 9px;border-radius:6px;font-weight:700}
.ddl-over{background:var(--red-bg);color:var(--red-text)}.ddl-soon{background:var(--amber-bg);color:var(--amber-text)}.ddl-ok{background:var(--blue-bg);color:var(--blue-text)}
.link-cat-btn{padding:6px 14px;border-radius:99px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--font);transition:all .15s}
.link-cat-btn:hover,.link-cat-btn.active{background:var(--green);color:var(--green-text);border-color:var(--green)}
.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.link-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:1rem;cursor:pointer;transition:all .15s;display:block}
.link-card:hover{border-color:var(--border2);transform:translateY(-2px);background:var(--bg4)}
.link-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.link-url{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.files-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.file-search{flex:1;min-width:180px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:8px 12px;font-size:13px;font-family:var(--font)}
.file-search:focus{outline:none;border-color:var(--green)}
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:1.5rem}
.folder-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:1rem;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
.folder-card:hover{border-color:var(--border2);background:var(--bg4)}
.folder-card.active-folder{border-color:var(--amber)}
.folder-icon{font-size:30px}
.folder-name{font-size:13px;font-weight:700}
.folder-count{font-size:11px;color:var(--text3)}
.files-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.file-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:all .15s;position:relative}
.file-card:hover{border-color:var(--border2)}
.file-preview{height:110px;background:var(--bg4);display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;position:relative}
.file-preview img,.file-preview video{width:100%;height:100%;object-fit:cover}
.file-icon-big{font-size:36px}
.file-info{padding:10px}
.file-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.file-meta{font-size:10px;color:var(--text3)}
.file-tag{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--bg4);color:var(--text3);margin-top:4px;display:inline-block}
.file-actions{display:flex;gap:4px;margin-top:6px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:300;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:1.5rem;width:500px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:1.25rem}
.form-row{display:flex;flex-direction:column;gap:5px;margin-bottom:1rem}
.form-row label{font-size:12px;color:var(--text2)}
.form-row input,.form-row select,.form-row textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:9px 10px;font-size:13px;font-family:var(--font);width:100%}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--green)}
.form-row textarea{resize:vertical;min-height:80px}
.form-row select option{background:var(--bg3)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ss{display:flex;gap:5px}.ss span{font-size:24px;cursor:pointer;opacity:.4}.ss span.on{opacity:1}
.canvas-toggle{display:flex;gap:4px;margin-bottom:.75rem;background:var(--bg4);border-radius:8px;padding:3px}
.canvas-toggle-btn{flex:1;padding:6px;border-radius:6px;font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:var(--font);transition:all .15s}
.canvas-toggle-btn.active{background:var(--bg2);color:var(--text);font-weight:700}
.draw-area{position:relative;border:1px solid var(--border2);border-radius:10px;overflow:hidden;background:#1a1e2b;touch-action:none}
.draw-canvas{display:block;width:100%;cursor:crosshair}
.draw-toolbar{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--bg3);border-bottom:1px solid var(--border);flex-wrap:wrap}
.tool-btn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;padding:5px 9px;font-size:13px;font-family:var(--font);transition:all .15s}
.tool-btn.active,.tool-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.color-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s;flex-shrink:0}
.color-swatch.sel{border-color:white}
.size-slider{width:70px;accent-color:var(--green)}
.draw-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px;pointer-events:none;transition:opacity .3s}
.inline-canvas-wrap{margin-top:8px}.inline-canvas-wrap canvas{width:100%;border-radius:8px;display:block;border:1px solid var(--border)}
.hw-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:99px;background:rgba(155,89,182,.2);color:#c39bd3;margin-left:6px}
.tabs{display:flex;gap:4px;margin-bottom:1.25rem;background:var(--bg3);border-radius:10px;padding:4px}
.tab{flex:1;padding:7px;text-align:center;border-radius:7px;font-size:12px;cursor:pointer;color:var(--text3);border:none;background:transparent;font-family:var(--font)}
.tab.active{background:var(--bg2);color:var(--text);font-weight:700}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.btn-primary{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;background:var(--green);color:var(--green-text);border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.btn-primary:hover{background:var(--green-dark)}
.btn-cancel{background:var(--bg4);border:1px solid var(--border2);color:var(--text2);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--font)}
.btn-save{background:var(--green);border:none;color:var(--green-text);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--font)}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text3)}
.empty-state i{font-size:40px;margin-bottom:12px;display:block}.empty-state p{font-size:13px}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:none;align-items:center;justify-content:center;flex-direction:column}
.lightbox.open{display:flex}
.lightbox img{max-width:95vw;max-height:85vh;border-radius:10px;object-fit:contain}
.lightbox video{max-width:95vw;max-height:85vh;border-radius:10px}
.lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:white;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox-name{color:rgba(255,255,255,.7);font-size:12px;margin-top:10px}
.upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:2rem;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--green);background:rgba(46,204,113,.05)}
.upload-zone i{font-size:36px;color:var(--text3);display:block;margin-bottom:8px}
.upload-zone p{font-size:13px;color:var(--text3)}.upload-zone span{font-size:11px;color:var(--text3);opacity:.7}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:99px;font-size:13px;z-index:600;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150}
.sidebar-overlay.open{display:block}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:99px}
@media(max-width:820px){
  .grid-2{grid-template-columns:1fr}.stats-strip{grid-template-columns:repeat(2,1fr)}
  .sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}.hamburger{display:block}
  .cal-cell{min-height:52px}.modal{width:100%;max-height:85vh}
}
</style>
</head>
<body>
<div class="sidebar-overlay" id="sb-overlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-icon"><i class="ti ti-layout-dashboard"></i></div>
    <div><div class="logo-text">Playbook</div><div class="logo-sub">東大アメフト部の手帳</div></div>
  </div>
  <nav class="nav">
    <div class="nav-label">メインメニュー</div>
    <button class="nav-btn active" onclick="gotoPage('dashboard')"><i class="ti ti-home"></i>ダッシュボード</button>
    <button class="nav-btn" onclick="gotoPage('calendar')"><i class="ti ti-calendar"></i>カレンダー<span class="nav-badge nb-g" id="cal-badge">0</span></button>
    <button class="nav-btn" onclick="gotoPage('tasks')"><i class="ti ti-list-check"></i>ToDo / タスク<span class="nav-badge nb-r" id="todo-badge">0</span></button>
    <button class="nav-btn" onclick="gotoPage('assignments')"><i class="ti ti-clock"></i>未提出課題<span class="nav-badge nb-a" id="asgn-badge">0</span></button>
    <div class="nav-label" style="margin-top:8px">トレーニング</div>

<script>
// ══ IndexedDB ══
const DB_NAME='playbookDB',DB_VER=3;
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('state'))d.createObjectStore('state');
      if(!d.objectStoreNames.contains('files')){const fs=d.createObjectStore('files',{keyPath:'id'});fs.createIndex('folderId','folderId',{unique:false});}
    };
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=rej;
  });
}
function dbGet(store,key){return new Promise((res,rej)=>{const req=db.transaction(store,'readonly').objectStore(store).get(key);req.onsuccess=e=>res(e.target.result);req.onerror=rej;});}
function dbPut(store,val,key){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readwrite'),os=tx.objectStore(store);
    const req=key!==undefined?os.put(val,key):os.put(val);
    req.onsuccess=()=>res();req.onerror=rej;
  });
}
function dbDelete(store,key){return new Promise(res=>{db.transaction(store,'readwrite').objectStore(store).delete(key).onsuccess=()=>res();});}
function dbGetAll(store){return new Promise(res=>{db.transaction(store,'readonly').objectStore(store).getAll().onsuccess=e=>res(e.target.result);});}
async function saveState(){await dbPut('state',state,'main');updateBadges();}
async function loadStateFromDB(){const s=await dbGet('state','main');return s||defaultState();}

// ══ HELPERS ══
const TODAY=new Date();TODAY.setHours(0,0,0,0);
const fmtDate=d=>d.toISOString().slice(0,10);
const parseDate=s=>new Date(s+'T00:00:00');
const diffDays=s=>Math.ceil((parseDate(s)-TODAY)/(1000*86400));
const jpDate=s=>parseDate(s).toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'});
const todayStr=()=>fmtDate(TODAY);
const CATS={study:'勉強',club:'部活',work:'バイト',other:'その他'};
const REPEAT_LABELS={none:'繰り返しなし',daily:'毎日',weekly:'毎週',monthly:'毎月',weekday:'平日のみ'};
const LINK_CATS=[{id:'all',label:'すべて'},{id:'study',label:'勉強・授業'},{id:'football',label:'アメフト'},{id:'univ',label:'大学'},{id:'work',label:'バイト'},{id:'useful',label:'便利ツール'},{id:'other',label:'その他'}];

// ══ REPEAT ══
function getEventsForDate(ds){
  const result=[];
  state.events.forEach(ev=>{
    if(!ev.repeat||ev.repeat==='none'){if(ev.date===ds)result.push(ev);}
    else{const b=parseDate(ev.date),tg=parseDate(ds);if(tg<b)return;
      if(ev.repeat==='daily'||
        (ev.repeat==='weekly'&&tg.getDay()===b.getDay())||
        (ev.repeat==='monthly'&&tg.getDate()===b.getDate())||
        (ev.repeat==='weekday'&&tg.getDay()>=1&&tg.getDay()<=5))result.push(ev);}
  });return result;
}
function getTasksForDate(ds){
  const result=[];
  state.tasks.forEach(t=>{
    if(!t.repeat||t.repeat==='none'){if(t.date===ds)result.push(t);}
    else{const b=parseDate(t.date),tg=parseDate(ds);if(tg<b)return;
      if(t.repeat==='daily'||
        (t.repeat==='weekly'&&tg.getDay()===b.getDay())||
        (t.repeat==='monthly'&&tg.getDate()===b.getDate())||
        (t.repeat==='weekday'&&tg.getDay()>=1&&tg.getDay()<=5))result.push(t);}
  });return result;
}

// ══ TOAST ══
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// ══ NAV ══
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sb-overlay').classList.toggle('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sb-overlay').classList.remove('open');}
const PAGE_TITLES={dashboard:'ダッシュボード',calendar:'カレンダー',tasks:'ToDo・タスク管理',assignments:'未提出課題',practice:'練習振り返り',fitness:'筋トレ・食事管理',diary:'日記',links:'リンク集',files:'ファイル管理'};
let currentPage='dashboard';
function gotoPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(el=>{const oa=el.getAttribute('onclick')||'';el.classList.toggle('active',oa.includes("'"+p+"'"));});
  document.getElementById('page-title').textContent=PAGE_TITLES[p];
  currentPage=p;renderPage(p);setTopbarActions(p);closeSidebar();
}
function setTopbarActions(p){
  const map={tasks:`<button class="btn-primary" onclick="openModal('task')"><i class="ti ti-plus"></i>タスク追加</button>`,assignments:`<button class="btn-primary" onclick="openModal('assignment')"><i class="ti ti-plus"></i>課題追加</button>`,practice:`<button class="btn-primary" onclick="openModal('practice')"><i class="ti ti-plus"></i>記録追加</button>`,fitness:`<button class="btn-primary" onclick="openFitnessAdd()"><i class="ti ti-plus"></i>記録追加</button>`,diary:`<button class="btn-primary" onclick="openModal('diary')"><i class="ti ti-plus"></i>日記を書く</button>`,links:`<button class="btn-primary" onclick="openModal('link')"><i class="ti ti-plus"></i>リンク追加</button>`};
  document.getElementById('topbar-actions').innerHTML=map[p]||'';
}
function renderPage(p){
  if(p==='dashboard')renderDashboard();
  else if(p==='calendar')renderCalendar();
  else if(p==='tasks')renderTasks(taskTab);
  else if(p==='assignments')renderAssignments();
  else if(p==='practice')renderPractice();
  else if(p==='fitness')renderFitness(fitTab);
  else if(p==='diary')renderDiary();
  else if(p==='links')renderLinks();
  else if(p==='files')renderFiles();
}
function updateBadges(){
  document.getElementById('todo-badge').textContent=getTasksForDate(todayStr()).filter(t=>!t.done).length;
  document.getElementById('asgn-badge').textContent=state.assignments.filter(a=>!a.done).length;
  document.getElementById('cal-badge').textContent=getEventsForDate(todayStr()).length;
  document.getElementById('link-badge').textContent=state.links.length;
  dbGetAll('files').then(f=>document.getElementById('file-badge').textContent=f.length);
}

// ══ DASHBOARD ══
function renderDashboard(){
  const tt=getTasksForDate(todayStr()),done=tt.filter(t=>t.done).length,pct=tt.length?Math.round(done/tt.length*100):0;
  const pa=state.assignments.filter(a=>!a.done),urg=pa.filter(a=>diffDays(a.deadline)<=3).length;
  const tkcal=state.fitness.meals.filter(m=>m.date===todayStr()).reduce((s,m)=>s+m.kcal,0);
  const lb=state.fitness.body.length?state.fitness.body[state.fitness.body.length-1]:null;
  document.getElementById('dash-stats').innerHTML=`
    <div class="stat-box"><div class="s-label">今日の完了率</div><div class="s-val c-g">${pct}%</div><div class="s-sub">${done}/${tt.length} 完了</div></div>
    <div class="stat-box"><div class="s-label">未提出課題</div><div class="s-val ${urg>0?'c-r':'c-a'}">${pa.length}</div><div class="s-sub">3日以内 ${urg}件</div></div>
    <div class="stat-box"><div class="s-label">本日カロリー</div><div class="s-val c-a">${tkcal}</div><div class="s-sub">kcal / 目標3200</div></div>
    <div class="stat-box"><div class="s-label">体重</div><div class="s-val c-b">${lb?lb.weight:'—'}</div><div class="s-sub">kg</div></div>`;
  document.getElementById('dash-todo-list').innerHTML=tt.slice(0,5).map(t=>`
    <div class="task-item"><div class="cb ${t.done?'done':''}" onclick="toggleTask(${t.id})"></div>
    <span class="task-name ${t.done?'done':''}">${t.name}</span>
    ${t.repeat&&t.repeat!=='none'?`<span class="repeat-chip"><i class="ti ti-repeat"></i></span>`:''}
    <span class="tag tag-${t.cat}">${CATS[t.cat]}</span></div>`).join('')||
    '<div class="empty-state"><i class="ti ti-check"></i><p>今日のタスクなし</p></div>';
  const we=new Date(TODAY.getTime()+6*86400000);
  const wev=[];for(let d=new Date(TODAY);d<=we;d.setDate(d.getDate()+1)){const ds=fmtDate(d);getEventsForDate(ds).forEach(ev=>wev.push({...ev,_ds:ds}));}
  wev.sort((a,b)=>a._ds.localeCompare(b._ds));
  document.getElementById('dash-events').innerHTML=wev.slice(0,6).map(e=>`
    <div class="task-item">
      <div style="width:8px;height:8px;border-radius:50%;background:${e.color==='green'?'var(--green)':e.color==='blue'?'var(--blue)':'var(--amber)'};flex-shrink:0"></div>
      <span style="flex:1;font-size:13px">${e.name}</span>
      <span style="font-size:11px;color:var(--text3)">${jpDate(e._ds)} ${e.time}</span>
    </div>`).join('')||'<div class="empty-state"><i class="ti ti-calendar"></i><p>今週の予定なし</p></div>';
  document.getElementById('dash-asgn-list').innerHTML=pa.slice(0,4).map(a=>{
    const d=diffDays(a.deadline),cls=d<=0?'ddl-over':d<=3?'ddl-soon':'ddl-ok',lbl=d<0?`${Math.abs(d)}日超過`:d===0?'今日':d+'日後';
    return `<div class="arow"><div><div class="aname">${a.name}</div><div class="asubj">${a.subject}</div></div><span class="ddl ${cls}">${lbl}</span></div>`;
  }).join('')||'<div class="empty-state"><i class="ti ti-check"></i><p>未提出課題なし</p></div>';
  const tex=state.fitness.exercises.filter(e=>e.date===todayStr());
  const cp=Math.min(100,Math.round(tkcal/3200*100));
  document.getElementById('dash-fitness').innerHTML=(tex.map(e=>`<div class="ex-item"><span class="ex-name">${e.name}</span><span class="ex-val">${e.sets}×${e.reps} ${e.weight}</span></div>`).join('')||'<div style="font-size:13px;color:var(--text3);padding:8px 0">今日の筋トレ記録なし</div>')+
    `<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px"><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px"><span>カロリー</span><span class="c-a">${tkcal}/3200 kcal</span></div><div class="pbar-bg"><div class="pbar" style="width:${cp}%;background:var(--amber)"></div></div></div>`;
}
function toggleTask(id){const t=state.tasks.find(x=>x.id===id);if(t){t.done=!t.done;saveState().then(()=>renderPage(currentPage));}}

// ══ CALENDAR ══
function renderCalendar(){
  const y=state.calYear,m=state.calMonth;
  document.getElementById('cal-month-label').textContent=`${y}年 ${m+1}月`;
  const first=new Date(y,m,1),last=new Date(y,m+1,0),sd=first.getDay();
  let html=['日','月','火','水','木','金','土'].map(d=>`<div class="cal-hcell">${d}</div>`).join('');
  for(let i=0;i<sd;i++){const pd=new Date(y,m,1-sd+i);html+=`<div class="cal-cell other-month"><div class="cal-day-num">${pd.getDate()}</div></div>`;}
  for(let d=1;d<=last.getDate();d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,isToday=ds===todayStr();
    const evs=getEventsForDate(ds),tasks=getTasksForDate(ds).filter(t=>!t.done),asgn=state.assignments.filter(a=>a.deadline===ds&&!a.done);
    let chips=evs.slice(0,2).map(e=>`<div class="cal-chip" style="background:${e.color==='green'?'rgba(46,204,113,.2)':e.color==='blue'?'rgba(52,152,219,.2)':'rgba(243,156,18,.2)'};color:${e.color==='green'?'var(--green)':e.color==='blue'?'var(--blue)':'var(--amber)'}">${e.name}</div>`).join('');
    if(tasks.length)chips+=`<div class="cal-chip" style="background:rgba(255,255,255,.05);color:var(--text3)">タスク ${tasks.length}</div>`;
    if(asgn.length)chips+=`<div class="cal-chip" style="background:rgba(231,76,60,.15);color:var(--red)">締切 ${asgn.length}</div>`;
    html+=`<div class="cal-cell${isToday?' today':''}" onclick="showCalDay('${ds}')"><div class="cal-day-num">${d}</div>${chips}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}
function changeMonth(dir){state.calMonth+=dir;if(state.calMonth>11){state.calMonth=0;state.calYear++;}if(state.calMonth<0){state.calMonth=11;state.calYear--;}saveState().then(()=>renderCalendar());}
function showCalDay(ds){
  document.getElementById('cal-detail').style.display='block';
  document.getElementById('cal-detail-label').textContent=jpDate(ds);

function buildMediaGrid(mediaArr,ctx,pid){
  if(!mediaArr||!mediaArr.length)return`<div class="media-grid"><button class="media-add-btn" onclick="triggerMedia('${ctx}',${pid})"><i class="ti ti-photo-plus"></i>写真・動画追加</button></div>`;
  return`<div class="media-grid">${mediaArr.map((m,i)=>`<div class="media-thumb" onclick="openMediaLightbox('${ctx}',${pid},${i})">${m.type==='video'?`<video src="${m.data}" preload="none"></video><div class="media-play-icon"><div><i class="ti ti-player-play" style="color:white;font-size:16px"></i></div></div>`:`<img src="${m.data}" alt="">`}<button class="media-del" onclick="event.stopPropagation();deleteMedia('${ctx}',${pid},${i})">✕</button></div>`).join('')}<button class="media-add-btn" onclick="triggerMedia('${ctx}',${pid})"><i class="ti ti-photo-plus"></i>追加</button></div>`;
}
function triggerMedia(ctx,pid){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*,video/*';inp.multiple=true;
  inp.onchange=async e=>{
    for(const file of e.target.files){
      const data=await compressFile(file);const isVid=file.type.startsWith('video/');const entry={type:isVid?'video':'image',data};
      if(ctx==='practice'){const p=state.practice.find(x=>x.id===pid);if(p){if(!p.media)p.media=[];p.media.push(entry);}}
      else if(ctx==='exercise'){const ex=state.fitness.exercises.find(x=>x.id===pid);if(ex){if(!ex.media)ex.media=[];ex.media.push(entry);}}
      else if(ctx==='meal'){const ml=state.fitness.meals.find(x=>x.id===pid);if(ml){if(!ml.media)ml.media=[];ml.media.push(entry);}}
    }
    await saveState();renderPage(currentPage);showToast('メディアを追加しました');
  };inp.click();
}
async function compressFile(file){
  return new Promise(res=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      if(file.type.startsWith('video/')){res(ev.target.result);return;}
      const img=new Image();img.onload=()=>{
        const max=900;let w=img.width,h=img.height;if(w>max){h=Math.round(h*max/w);w=max;}
        const cvs=document.createElement('canvas');cvs.width=w;cvs.height=h;cvs.getContext('2d').drawImage(img,0,0,w,h);res(cvs.toDataURL('image/jpeg',0.72));
      };img.src=ev.target.result;
    };reader.readAsDataURL(file);
  });
}
function deleteMedia(ctx,pid,idx){
  if(ctx==='practice'){const p=state.practice.find(x=>x.id===pid);if(p&&p.media)p.media.splice(idx,1);}
  else if(ctx==='exercise'){const ex=state.fitness.exercises.find(x=>x.id===pid);if(ex&&ex.media)ex.media.splice(idx,1);}
  else if(ctx==='meal'){const ml=state.fitness.meals.find(x=>x.id===pid);if(ml&&ml.media)ml.media.splice(idx,1);}
  saveState().then(()=>renderPage(currentPage));
}
function openMediaLightbox(ctx,pid,idx){
  let arr=[];
  if(ctx==='practice'){const p=state.practice.find(x=>x.id===pid);if(p)arr=p.media||[];}
  else if(ctx==='exercise'){const ex=state.fitness.exercises.find(x=>x.id===pid);if(ex)arr=ex.media||[];}
  else if(ctx==='meal'){const ml=state.fitness.meals.find(x=>x.id===pid);if(ml)arr=ml.media||[];}
  if(!arr[idx])return;const m=arr[idx];
  document.getElementById('lightbox-content').innerHTML=m.type==='video'?`<video src="${m.data}" controls autoplay style="max-width:95vw;max-height:85vh;border-radius:10px"></video>`:`<img src="${m.data}">`;
  document.getElementById('lightbox-name').textContent='';
  document.getElementById('lightbox').classList.add('open');
}

function handleFileSelect(files){pendingFiles=Array.from(files);document.getElementById('uprev').innerHTML=pendingFiles.length?pendingFiles.map(f=>`<div style="font-size:12px;color:var(--text2);padding:2px 0">📎 ${f.name} (${formatSize(f.size)})</div>`).join(''):'';}
function handleFileDrop(e){e.preventDefault();document.getElementById('udz').classList.remove('drag');pendingFiles=Array.from(e.dataTransfer.files);handleFileSelect(pendingFiles);}
async function uploadFiles(){
  if(!pendingFiles.length){closeModal();return;}
  const folderId=document.getElementById('fsel').value||'';
  const tags=document.getElementById('ftags').value.trim().split(/\s+/).filter(Boolean);
  let saved=0;
  for(const file of pendingFiles){
    await new Promise(res=>{
      const reader=new FileReader();
      reader.onload=async ev=>{
        let data=ev.target.result;let fileType='other';
        if(file.type.startsWith('image/')){fileType='image';data=await compressFile(file);}
        else if(file.type.startsWith('video/'))fileType='video';
        else if(file.type.includes('pdf'))fileType='pdf';
        else if(file.type.includes('word')||file.name.endsWith('.docx'))fileType='doc';
        else if(file.type.includes('excel')||file.name.endsWith('.xlsx'))fileType='xls';
        else if(file.type.includes('text'))fileType='txt';
        const id='f_'+Date.now()+'_'+Math.random().toString(36).slice(2);
        await dbPut('files',{id,name:file.name,fileType,data,folderId,tags,size:file.size,createdAt:Date.now()});
        saved++;res();
      };reader.readAsDataURL(file);
    });
  }
  pendingFiles=[];closeModal();await renderFiles();showToast(`${saved}件保存しました`);
}

// ══ DRAWING ENGINE ══
let activeCanvas=null,activeCtx=null,isDrawing=false,drawColor='#e8eaf0',drawSize=3,drawTool='pen',drawHistory=[],drawHistoryIdx=-1;
const DRAW_COLORS=['#e8eaf0','#2ECC71','#F39C12','#3498DB','#e74c3c','#9b59b6','#f1c40f'];
function initDrawCanvas(cvs,w=700,h=300){
  cvs.width=w;cvs.height=h;const ctx=cvs.getContext('2d');
  ctx.fillStyle='#1a1e2b';ctx.fillRect(0,0,w,h);
  activeCanvas=cvs;activeCtx=ctx;drawHistory=[ctx.getImageData(0,0,w,h)];drawHistoryIdx=0;
  setupDrawEvents(cvs,ctx);
}
function setupDrawEvents(canvas,ctx){
  const gp=(e,t)=>{const r=canvas.getBoundingClientRect(),sx=canvas.width/r.width,sy=canvas.height/r.height;if(t)return{x:(t.clientX-r.left)*sx,y:(t.clientY-r.top)*sy};return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};};
  const sd=pos=>{isDrawing=true;ctx.beginPath();ctx.moveTo(pos.x,pos.y);if(drawTool==='pen'){ctx.globalCompositeOperation='source-over';ctx.strokeStyle=drawColor;ctx.lineWidth=drawSize;}else{ctx.globalCompositeOperation='destination-out';ctx.lineWidth=drawSize*4;}ctx.lineCap='round';ctx.lineJoin='round';const h=canvas.parentElement.querySelector('.draw-hint');if(h)h.style.opacity='0';};
  const md=pos=>{if(!isDrawing)return;ctx.lineTo(pos.x,pos.y);ctx.stroke();};
  const ed=()=>{if(!isDrawing)return;isDrawing=false;drawHistory=drawHistory.slice(0,drawHistoryIdx+1);drawHistory.push(ctx.getImageData(0,0,canvas.width,canvas.height));drawHistoryIdx=drawHistory.length-1;ctx.globalCompositeOperation='source-over';};
  canvas.addEventListener('mousedown',e=>{e.preventDefault();sd(gp(e));});
  canvas.addEventListener('mousemove',e=>{e.preventDefault();md(gp(e));});
  canvas.addEventListener('mouseup',e=>{e.preventDefault();ed();});
  canvas.addEventListener('mouseleave',()=>ed());
  canvas.addEventListener('touchstart',e=>{e.preventDefault();sd(gp(e,e.touches[0]));},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();md(gp(e,e.touches[0]));},{passive:false});
  canvas.addEventListener('touchend',e=>{e.preventDefault();ed();},{passive:false});
}
function undoDraw(){if(!activeCtx||drawHistoryIdx<=0)return;drawHistoryIdx--;activeCtx.putImageData(drawHistory[drawHistoryIdx],0,0);}
function clearDraw(){if(!activeCtx||!activeCanvas)return;activeCtx.fillStyle='#1a1e2b';activeCtx.fillRect(0,0,activeCanvas.width,activeCanvas.height);drawHistory=[activeCtx.getImageData(0,0,activeCanvas.width,activeCanvas.height)];drawHistoryIdx=0;const h=activeCanvas.parentElement.querySelector('.draw-hint');if(h)h.style.opacity='1';}
function setDrawColor(c,el){drawColor=c;document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('sel'));if(el)el.classList.add('sel');}
function setDrawTool(t,btn){drawTool=t;document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');}
function setDrawSize(v){drawSize=parseInt(v);}
function getDrawingDataURL(){return activeCanvas?activeCanvas.toDataURL('image/webp',0.8):null;}
function restoreDrawing(canvas,dataUrl){if(!dataUrl||!canvas)return;const img=new Image();img.onload=()=>{canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);};img.src=dataUrl;}
function makeDrawToolbar(cid){
  return`<div class="draw-toolbar">
    <button class="tool-btn active" onclick="setDrawTool('pen',this)"><i class="ti ti-pencil"></i></button>
    <button class="tool-btn" onclick="setDrawTool('eraser',this)"><i class="ti ti-eraser"></i></button>
    <div style="width:1px;height:20px;background:var(--border);margin:0 2px"></div>
    ${DRAW_COLORS.map((c,i)=>`<div class="color-swatch ${i===0?'sel':''}" style="background:${c}" onclick="setDrawColor('${c}',this)"></div>`).join('')}
    <div style="width:1px;height:20px;background:var(--border);margin:0 2px"></div>
    <input class="size-slider" type="range" min="1" max="20" value="3" oninput="setDrawSize(this.value)">
    <div style="flex:1"></div>
    <button class="tool-btn" onclick="undoDraw()"><i class="ti ti-arrow-back-up"></i></button>
    <button class="tool-btn" onclick="clearDraw()"><i class="ti ti-trash"></i></button>
  </div>
  <div class="draw-area"><canvas id="${cid}" class="draw-canvas"></canvas>
  <div class="draw-hint"><i class="ti ti-pencil" style="margin-right:6px"></i>Apple Pencil対応 — ここに手書きできます</div></div>`;
}
function makeInputToggle(tid,did){
  return`<div class="canvas-toggle">
    <button class="canvas-toggle-btn active" onclick="switchInputMode('text','${tid}','${did}',this.parentElement)"><i class="ti ti-keyboard" style="margin-right:4px"></i>テキスト</button>
    <button class="canvas-toggle-btn" onclick="switchInputMode('draw','${tid}','${did}',this.parentElement)"><i class="ti ti-pencil" style="margin-right:4px"></i>手書き</button>

function switchInputMode(mode,tid,did,toggleEl){
  toggleEl.querySelectorAll('.canvas-toggle-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&mode==='text')||(i===1&&mode==='draw')));
  const te=document.getElementById(tid),de=document.getElementById(did);
  if(te)te.style.display=mode==='text'?'':'none';
  if(de){de.style.display=mode==='draw'?'':'none';if(mode==='draw'){const c=de.querySelector('canvas');if(c&&!c.dataset.init){c.dataset.init='1';initDrawCanvas(c,700,280);}else if(c){activeCanvas=c;activeCtx=c.getContext('2d');}}}
}

function saveEvent(){
  const name=gv('mn').trim();if(!name)return;
  state.events.push({id:state.nextId++,name,date:gv('md'),time:gv('mt'),color:gv('mcol'),repeat:gv('mr')});
  saveState().then(()=>{closeModal();renderPage(currentPage);showToast('予定を追加しました');});
}
function savePractice(){
  const focus=gv('mfc').trim();if(!focus)return;
  const tags=gv('mtg').trim().split(/\s+/).filter(Boolean);
  const dd=document.getElementById('mpd'),drawing=dd&&dd.style.display!=='none'&&activeCanvas?getDrawingDataURL():null;
  state.practice.push({id:state.nextId++,date:gv('md'),focus,rating:modalRating,memo:gv('mm'),tags,feeling:gv('mf'),drawing,media:[]});
  saveState().then(()=>{closeModal();renderPage(currentPage);showToast('練習記録を保存しました');});
}
function saveExercise(){
  const name=gv('mn').trim();if(!name)return;
  state.fitness.exercises.push({id:state.nextId++,date:gv('md'),name,sets:parseInt(gv('mst'))||0,reps:gv('mrp'),weight:gv('mw'),media:[]});
  saveState().then(()=>{closeModal();renderFitness(fitTab);showToast('筋トレ記録を保存しました');});
}
function saveMeal(){
  const name=gv('mn').trim();if(!name)return;
  state.fitness.meals.push({id:state.nextId++,date:gv('md'),name,kcal:parseInt(gv('mk'))||0,protein:parseInt(gv('mpr'))||0,carbs:parseInt(gv('mcb'))||0,fat:0,media:[]});
  saveState().then(()=>{closeModal();renderFitness(fitTab);showToast('食事記録を保存しました');});
}
function saveBody(){
  state.fitness.body.push({id:state.nextId++,date:gv('md'),weight:parseFloat(gv('mw'))||0,bodyFat:parseFloat(gv('mbf'))||0,muscle:parseFloat(gv('mmu'))||0});
  saveState().then(()=>{closeModal();renderFitness(fitTab);showToast('体重を記録しました');});
}
function saveDiary(dc,tc){
  const text=gv('mdi').trim();const dd=document.getElementById('mdd'),drawing=dd&&dd.style.display!=='none'&&activeCanvas?getDrawingDataURL():null;
  if(!text&&!drawing)return;
  state.diary.push({id:state.nextId++,date:gv('md'),mood:modalMood,text,todos_done:dc,todos_total:tc,drawing});
  saveState().then(()=>{closeModal();renderDiary();showToast('日記を保存しました');});
}
function saveLink(){
  const title=gv('mlt').trim(),url=gv('mlu').trim();if(!title||!url)return;
  state.links.push({id:state.nextId++,title,url,cat:gv('mlc'),icon:gv('mli')||'🔗',note:gv('mln').trim()});
  saveState().then(()=>{closeModal();renderLinks();showToast('リンクを追加しました');});
}
function saveFolder(){
  const name=gv('mfn').trim();if(!name)return;
  if(!state.folders)state.folders=[];
  state.folders.push({id:'f'+Date.now(),name,icon:gv('mfi')||'📁'});
  saveState().then(()=>{closeModal();renderFiles();showToast('フォルダを作成しました');});
}

// ══ INIT ══
async function init(){
  await openDB();
  state=await loadStateFromDB();
  document.getElementById('sidebar-date').textContent=TODAY.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  updateBadges();
  renderDashboard();
}
init();
</script></body></html>
